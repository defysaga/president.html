<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erik Monsen Teller</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }

        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
        }

        p {
            font-style: italic;
            color: #666;
            margin-bottom: 30px;
        }

        #counter {
            font-size: 5rem;
            font-weight: bold;
            color: #222;
            margin-bottom: 20px;
        }

        .red-button {
            width: 250px;
            height: 250px;
            background-color: #ff0000;
            border: none;
            border-radius: 50%;
            box-shadow: 0 10px #990000;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.1s;
            outline: none;
        }

        .red-button:active {
            box-shadow: 0 2px #660000;
            transform: translateY(8px);
        }

        .button-text {
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
            text-align: center;
            text-transform: uppercase;
            user-select: none;
        }

        .reset-btn {
            margin-top: 50px;
            background: none;
            border: 1px solid #ccc;
            color: #999;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 4px;
        }

        .reset-btn:hover {
            background-color: #ddd;
        }

        .status {
            margin-top: 20px;
            color: #777;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <h1>Erik Monsen-o-meter</h1>
    <p>"...hvis jeg hadde vært president"</p>

    <div id="counter">0</div>

    <button class="red-button" onclick="increment()">
        <span class="button-text">TRYKK HER</span>
    </button>

    <button class="reset-btn" onclick="resetCounter()">Nullstill teller</button>

    <div id="status" class="status">Kobler til Firebase...</div>

    <script type="module" src="./app.js"></script>

</body>
</html>
